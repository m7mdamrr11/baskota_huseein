<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منتجات رجالي - Perfume Store</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:#fff6f7; }

/* Navbar */
.navbar-new{ display:flex; align-items:center; justify-content:space-between; padding:20px 8%; background:linear-gradient(90deg,#ffeaea,#ffffff); position:sticky; top:0; z-index:1000; box-shadow:0 5px 15px rgba(0,0,0,0.05); transition:0.3s; }
.navbar-new:hover{ box-shadow:0 5px 20px rgba(0,0,0,0.15); }
.logo img{ height:60px; width:auto; display:block; }
.nav-links{ display:flex; gap:35px; font-weight:500; }
.nav-links a{ text-decoration:none; color:#333; position:relative; transition:0.3s; }
.nav-links a:hover, .nav-links a.active{ color:#d96a78; }
.nav-links a::after{ content:''; position:absolute; width:0%; height:2px; background:#d96a78; left:0; bottom:-5px; transition:0.3s; }
.nav-links a:hover::after, .nav-links a.active::after{ width:100%; }
.icons{ display:flex; gap:20px; font-size:18px; cursor:pointer; }
.menu-toggle{ display:none; font-size:28px; color:#d96a78; cursor:pointer; }

/* Mobile Navbar */
@media(max-width:768px){
.nav-links{ position:absolute; top:70px; right:0; background:white; flex-direction:column; width:220px; padding:25px; gap:20px; box-shadow:0 5px 20px rgba(0,0,0,0.1); transform:translateX(100%); transition:0.4s; border-radius:10px 0 0 10px; }
.nav-links.active{ transform:translateX(0); }
.menu-toggle{ display:block; }
}

/* Hero */
.hero-new{ display:flex; align-items:center; justify-content:space-between; padding:80px 8%; background:linear-gradient(135deg, #ffeaea, #fff6f7); flex-wrap:wrap; gap:30px; }
.hero-new .hero-text h2{ font-size:32px; color:#333; margin-bottom:10px; }
.hero-new .hero-text h1{ font-size:70px; font-family:'Pacifico',cursive; color:#d96a78; margin-bottom:15px; }
.hero-new .hero-text p{ font-size:16px; color:#555; margin-bottom:20px; }
.hero-new .hero-text .btn-shop{ background:#d96a78; color:white; border:none; padding:15px 40px; border-radius:30px; font-size:16px; cursor:pointer; transition:0.3s; }
.hero-new .hero-text .btn-shop:hover{ background:#c35664; }
.hero-new .hero-image img{ width:400px; max-width:100%; border-radius:15px; }

/* نص قبل المنتجات */
.products-text{ text-align:center; font-size:16px; margin:30px 0; color:#555; }

/* Products */
.products{ padding:40px 8%; }
.products-container{ display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
.product-card{ background:#fff; padding:15px; border-radius:15px; transition:0.3s; box-shadow:0 5px 15px rgba(0,0,0,0.08); }
.product-card:hover{ transform:translateY(-5px); }
.product-card img{ width:100%; height:200px; object-fit:cover; border-radius:10px; }
.product-card h3{ margin:10px 0 5px; font-size:18px; }
.product-card .inspired{ font-size:14px; color:#666; margin-bottom:10px; }
.card-buttons{ display:flex; justify-content:space-between; gap:10px; margin-top:10px; }
.order-btn, .details-btn{ background:#d96a78; color:white; padding:8px 20px; border-radius:25px; text-decoration:none; font-size:14px; transition:0.3s; display:inline-block; text-align:center; }
.order-btn:hover, .details-btn:hover{ background:#c35664; }

/* Popup Details */
.popup-overlay{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:10000; }
.popup-content{ background:white; padding:30px; border-radius:15px; width:90%; max-width:400px; text-align:center; position:relative; }
.popup-content img{ width:150px; border-radius:10px; margin-bottom:15px; }
.popup-content h3{ margin-bottom:10px; font-size:20px; color:#d96a78; }
.popup-content p{ margin-bottom:8px; color:#555; font-weight:500; }
.close-btn{ position:absolute; top:10px; right:15px; font-size:22px; cursor:pointer; color:#d96a78; }

/* Mobile */
@media(max-width:768px){
.hero-new{ flex-direction:column; text-align:center; padding:40px 5%; }
.hero-new .hero-text h1{ font-size:50px; }
.hero-new .hero-text h2{ font-size:24px; }
.hero-new .hero-text p{ font-size:14px; }
.hero-new .hero-image img{ width:250px; margin-top:20px; }
.products-container{ grid-template-columns:1fr; }
.product-card img{ height:180px; }
}
</style>
</head>
<body>

<!-- Navbar -->
<header class="navbar-new">
  <div class="logo">
    <img src="logo-removebg-preview.jpg" alt="Logo">
  </div>
  <nav class="nav-links">
    <a href="index.html"><i class="fa-solid fa-arrow-right-to-bracket"></i> الرئيسية</a>
    <a class="active" href="men.html">رجالي</a>
    <a href="women.html">حريمي</a>
    <a href="contact.html">اتصل بنا</a>
  </nav>
  <div class="icons">   
  <i class="fa-solid fa-bars menu-toggle"></i>
</header>

<!-- Hero -->
<section class="hero-new">
  <div class="hero-text">
    <h2>Men Perfume</h2>
    <h1>عطور فاخرة</h1>
    <p>أفضل التركيبات العطرية للرجال</p>
  </div>
  <div class="hero-image">
    <img src="man1.jpeg" alt="Men Perfumes">
  </div>
</section>

<p class="products-text">اختر عطرك الرجالي المفضل من مجموعتنا المختارة من أشهر العطور العالمية.</p>

<!-- Products -->
<section class="products">
  <div class="products-container">
    <div class="product-card">
      <img src="sauvage.jpeg" alt="Alpha Men">
      <h3>SAUVAGE</h3>
      <!-- <p class="inspired">Inspired by Dior</p> -->
      <div class="card-buttons">
        <a href="https://wa.me/201205232385?text=مرحباً! اريد طلب sauvage" class="order-btn" target="_blank">اطلب الآن</a>
        <a href="#" class="details-btn" 
          data-name="SAUVAGE"
          data-img="sauvage.jpeg"
          data-high="تركيز عالي: 15 L.E/جرام"
          data-medium="تركيز متوسط: 10 L.E/جرام">التفاصيل</a>
      </div>
    </div>
    <!-- proudect 2 -->
    <div class="product-card">
      <img src="black-xss.jpeg" alt="black-xs">
      <h3>BLACK Xs</h3>
      <!-- <p class="inspired">Inspired by Chanel</p> -->
      <div class="card-buttons">
        <a href="https://wa.me/201205232385?text=مرحباً! اريد طلب black-xs" class="order-btn" target="_blank">اطلب الآن</a>
        <a href="#" class="details-btn" 
          data-name="BLACK Xs"
          data-img="black-xs.jpeg"
          data-high="تركيز عالي: 15 L.E/جرام"
          data-medium="تركيز متوسط: 10 L.E/جرام">التفاصيل</a>
      </div>
    </div>
  </div>
</section>

<!-- Popup Details -->
<div id="product-popup" class="popup-overlay">
  <div class="popup-content">
    <span class="close-btn">&times;</span>
    <img id="popup-img" src="" alt="Perfume">
    <h3 id="popup-name"></h3>
    <p id="popup-high"></p>
    <p id="popup-medium"></p>
  </div>
</div>

<script>
// Menu toggle mobile
const menuToggle = document.querySelector('.menu-toggle');
const navLinks = document.querySelector('.nav-links');
menuToggle.addEventListener('click', () => { navLinks.classList.toggle('active'); });

// Popup details
const popup = document.getElementById('product-popup');
const popupImg = document.getElementById('popup-img');
const popupName = document.getElementById('popup-name');
const popupHigh = document.getElementById('popup-high');
const popupMedium = document.getElementById('popup-medium');
const closeBtn = document.querySelector('.close-btn');

document.querySelectorAll('.details-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.preventDefault();
    popup.style.display = 'flex';
    popupImg.src = btn.dataset.img;
    popupName.textContent = btn.dataset.name;
    popupHigh.textContent = btn.dataset.high;
    popupMedium.textContent = btn.dataset.medium;
  });
});

closeBtn.addEventListener('click', () => { popup.style.display = 'none'; });
window.addEventListener('click', e => { if(e.target === popup) popup.style.display = 'none'; });
</script>

</body>
</html>
